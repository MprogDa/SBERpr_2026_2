<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Подтверждение регистрации</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
</head>
<body style="background: #f5f5f5; display: flex; align-items: center; justify-content: center; height: 100vh;">
<div class="ui segment" style="width: 400px;">
    <h3 class="ui header">Подтверждение email</h3>
    <p>Введите код, отправленный на вашу почту.</p>
    <form th:action="@{/register/code}" method="post" class="ui form">
        <div class="field">
            <label>Код с почты</label>
            <input type="text" name="code" placeholder="Например: 654321" required>
        </div>
        <button type="submit" class="ui primary button fluid">Подтвердить</button>
        <div style="margin-top: 15px; text-align: center;">
            <a href="/register">Вернуться к регистрации</a>
        </div>
    </form>
</div>
</body>
</html>
