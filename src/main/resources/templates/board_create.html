<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создание доски</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
</head>
<body>
<div class="ui container" style="margin-top: 50px;">
    <div class="ui centered grid">
        <div class="eight wide column">
            <div class="ui segment">
                <h2 class="ui header">Создание новой доски</h2>
                <!-- форма создания доски -->
                <form th:action="@{/board/new}" method="post" class="ui form">
                    <div class="field">
                        <label>Название доски</label>
                        <input type="text" name="title" placeholder="Введите название доски" required>
                    </div>
                    <!-- Кнопки Создать и Отмена -->
                    <div class="ui two buttons" style="margin-top: 20px;">
                        <button type="submit" class="ui primary button">Создать</button>
                        <a href="/dashboard" class="ui button">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
